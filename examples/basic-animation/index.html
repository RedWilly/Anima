<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anima - Basic Animation Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #fff;
    }

    h1 {
      margin-bottom: 1rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: #e94560;
    }

    .controls {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    button {
      padding: 0.5rem 1.5rem;
      border: none;
      border-radius: 4px;
      background: #e94560;
      color: white;
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:hover {
      background: #ff6b6b;
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(0);
    }

    canvas {
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    .info {
      margin-top: 1rem;
      font-size: 0.875rem;
      opacity: 0.7;
    }
  </style>
</head>

<body>
  <h1>✨ ANIMA</h1>

  <div class="controls">
    <button id="playBtn">▶ Play</button>
    <button id="pauseBtn">⏸ Pause</button>
    <button id="resetBtn">↺ Reset</button>
  </div>

  <canvas id="canvas"></canvas>

  <p class="info">A fluent animation engine for JavaScript</p>

  <script type="module">
    // Inline implementation for demo (avoids build step)

    // Easing functions
    const easing = {
      linear: t => t,
      easeIn: t => t * t,
      easeOut: t => t * (2 - t),
      easeInOut: t => t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t,
      elastic: t => t === 0 || t === 1 ? t : Math.pow(2, -10 * t) * Math.sin((t - 0.075) * (2 * Math.PI) / 0.3) + 1,
      bounce: t => {
        if (t < 1 / 2.75) return 7.5625 * t * t;
        if (t < 2 / 2.75) { const t2 = t - 1.5 / 2.75; return 7.5625 * t2 * t2 + 0.75; }
        if (t < 2.5 / 2.75) { const t2 = t - 2.25 / 2.75; return 7.5625 * t2 * t2 + 0.9375; }
        const t2 = t - 2.625 / 2.75; return 7.5625 * t2 * t2 + 0.984375;
      }
    };

    function lerp(a, b, t) { return a + (b - a) * t; }
    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

    // Simple animation system
    class Shape {
      constructor(type, props) {
        this.type = type;
        this.x = 0;
        this.y = 0;
        this.scaleX = 1;
        this.scaleY = 1;
        this.rotation = 0;
        this.opacity = 1;
        this.fillColor = props?.fill || '#e94560';
        this.strokeColor = props?.stroke || '#ff6b6b';
        this.strokeWidth = props?.strokeWidth || 2;
        this.radius = props?.radius || 50;
        this.width = props?.width || 100;
        this.height = props?.height || 100;
        this.actions = [];
        this.actionIndex = 0;
        this.actionTime = 0;
        this.actionStart = {};
      }

      moveTo(x, y, opts = {}) {
        this.actions.push({ type: 'move', x, y, duration: opts.duration || 0.5, ease: opts.ease || 'easeInOut' });
        return this;
      }

      scaleTo(sx, sy, opts = {}) {
        this.actions.push({ type: 'scale', sx, sy, duration: opts.duration || 0.5, ease: opts.ease || 'easeInOut' });
        return this;
      }

      rotateTo(angle, opts = {}) {
        this.actions.push({ type: 'rotate', angle, duration: opts.duration || 0.5, ease: opts.ease || 'linear' });
        return this;
      }

      fadeOut(opts = {}) {
        this.actions.push({ type: 'fade', target: 0, duration: opts.duration || 0.5, ease: opts.ease || 'easeInOut' });
        return this;
      }

      fadeIn(opts = {}) {
        this.actions.push({ type: 'fade', target: 1, duration: opts.duration || 0.5, ease: opts.ease || 'easeInOut' });
        return this;
      }

      wait(seconds) {
        this.actions.push({ type: 'wait', duration: seconds });
        return this;
      }

      fill(color) { this.fillColor = color; return this; }
      stroke(color) { this.strokeColor = color; return this; }

      update(dt) {
        if (this.actionIndex >= this.actions.length) return;

        const action = this.actions[this.actionIndex];

        // Capture start values on first frame of action
        if (this.actionTime === 0) {
          this.actionStart = {
            x: this.x, y: this.y,
            scaleX: this.scaleX, scaleY: this.scaleY,
            rotation: this.rotation,
            opacity: this.opacity
          };
        }

        this.actionTime += dt;
        const progress = clamp(this.actionTime / action.duration, 0, 1);
        const easeFn = easing[action.ease] || easing.linear;
        const t = easeFn(progress);

        switch (action.type) {
          case 'move':
            this.x = lerp(this.actionStart.x, action.x, t);
            this.y = lerp(this.actionStart.y, action.y, t);
            break;
          case 'scale':
            this.scaleX = lerp(this.actionStart.scaleX, action.sx, t);
            this.scaleY = lerp(this.actionStart.scaleY, action.sy, t);
            break;
          case 'rotate':
            this.rotation = lerp(this.actionStart.rotation, action.angle, t);
            break;
          case 'fade':
            this.opacity = lerp(this.actionStart.opacity, action.target, t);
            break;
        }

        if (progress >= 1) {
          this.actionIndex++;
          this.actionTime = 0;
        }
      }

      render(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        ctx.scale(this.scaleX, this.scaleY);
        ctx.globalAlpha = this.opacity;

        ctx.fillStyle = this.fillColor;
        ctx.strokeStyle = this.strokeColor;
        ctx.lineWidth = this.strokeWidth;

        if (this.type === 'circle') {
          ctx.beginPath();
          ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
        } else if (this.type === 'rect') {
          ctx.beginPath();
          ctx.rect(-this.width / 2, -this.height / 2, this.width, this.height);
          ctx.fill();
          ctx.stroke();
        }

        ctx.restore();
      }

      reset() {
        this.actionIndex = 0;
        this.actionTime = 0;
        this.x = 0;
        this.y = 0;
        this.scaleX = 1;
        this.scaleY = 1;
        this.rotation = 0;
        this.opacity = 1;
      }
    }

    // Create canvas
    const canvas = document.getElementById('canvas');
    canvas.width = 800;
    canvas.height = 600;
    const ctx = canvas.getContext('2d');

    // Create shapes with fluent API - THIS IS THE MAGIC!
    const circle = new Shape('circle', { radius: 40, fill: '#e94560', stroke: '#ff6b6b' })
      .moveTo(200, 300, { duration: 1, ease: 'easeInOut' })
      .wait(0.2)
      .moveTo(600, 300, { duration: 1.5, ease: 'elastic' })
      .wait(0.2)
      .scaleTo(1.5, 1.5, { duration: 0.5, ease: 'easeOut' })
      .fadeOut({ duration: 0.8 });

    const rect = new Shape('rect', { width: 80, height: 80, fill: '#0f3460', stroke: '#16213e' })
      .moveTo(400, 150, { duration: 0.8, ease: 'easeOut' })
      .rotateTo(Math.PI * 2, { duration: 2, ease: 'linear' })
      .moveTo(400, 450, { duration: 1, ease: 'bounce' });

    const shapes = [circle, rect];

    // Playback state
    let playing = false;
    let lastTime = 0;

    function render(timestamp) {
      const dt = lastTime ? (timestamp - lastTime) / 1000 : 0;
      lastTime = timestamp;

      // Clear and draw background
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Update and render shapes
      if (playing) {
        shapes.forEach(s => s.update(dt));
      }
      shapes.forEach(s => s.render(ctx));

      requestAnimationFrame(render);
    }

    // Controls
    document.getElementById('playBtn').onclick = () => { playing = true; };
    document.getElementById('pauseBtn').onclick = () => { playing = false; };
    document.getElementById('resetBtn').onclick = () => {
      shapes.forEach(s => s.reset());
      playing = true;
    };

    // Start render loop
    requestAnimationFrame(render);
  </script>
</body>

</html>
